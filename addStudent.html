<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
    <div class="logo">
        <a href="index.html">StudentMS</a>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>

    <div class="nav-btn" id="authBtn"></div>
</nav>


<script>
const authBtn = document.getElementById("authBtn");

if(localStorage.getItem("loggedIn") === "true"){
    authBtn.innerHTML =
    `<a href="logout.html" class="login-btn">Logout</a>`;
}else{
    authBtn.innerHTML =
    `<a href="login.html" class="login-btn">Login</a>`;
}
</script>

<div class="container">
    <h2>Add Student</h2>

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="roll" placeholder="Roll Number">
    <input type="text" id="course" placeholder="Course">

    <button onclick="addStudent()">Save</button>
</div>

<script>
function addStudent() {

    let students =
        JSON.parse(localStorage.getItem("students")) || [];

    let student = {
        name: document.getElementById("name").value,
        roll: document.getElementById("roll").value,
        course: document.getElementById("course").value
    };

    students.push(student);

    localStorage.setItem(
        "students",
        JSON.stringify(students)
    );

    alert("Student Added");
    window.location.href="viewStudents.html";
}
</script>

</body>
</html>
