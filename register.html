<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
    <div class="logo">
        <a href="index.html">StudentMS</a>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="contact.html">Contact</a></li>
    
    </ul>

    <div class="nav-btn" id="authBtn"></div>
</nav>

<script>
const authBtn = document.getElementById("authBtn");

if(localStorage.getItem("loggedIn") === "true"){
    authBtn.innerHTML =
    `<a href="logout.html" class="login-btn">Logout</a>`;
}else{
    authBtn.innerHTML =
    `<a href="login.html" class="login-btn">Login</a>`;
}
</script>

<div class="container">
    <h2>User Registration</h2>

    <input type="text"
       id="username"
       placeholder="Username or Email">
    <input type="password"
       id="password"
       placeholder="Password">
    
    <button onclick="register()">Register</button>

    <p>Already have an account?
        <a href="login.html">Login</a>
    </p>
</div>

<script>
function register() {

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    let usernamePattern = /^[A-Za-z0-9_]+$/;
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    let savedUser = localStorage.getItem("username");

    if(username === ""){
        alert("Username or Email is required");
        return;
    }

    if(
        !usernamePattern.test(username) &&
        !emailPattern.test(username)
    ){
        alert("Enter a valid Username or Email");
        return;
    }

    if(password === ""){
        alert("Password is required");
        return;
    }
    if(password.length < 6){
        alert("Password must be at least 6 characters");
        return;
    }
    if(username === savedUser){
        alert("User already exists");
        return;
    }
    localStorage.setItem("username", username);
    localStorage.setItem("password", password);

    alert("Registration Successful");

    window.location.href = "login.html";
}
</script>

</body>
</html>
