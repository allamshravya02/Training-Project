<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
    <div class="logo">
        <a href="index.html">StudentMS</a>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="contact.html">Contact</a></li>
      
    </ul>

    <div class="nav-btn" id="authBtn"></div>
</nav>

<script>
const authBtn = document.getElementById("authBtn");

if(localStorage.getItem("loggedIn") === "true"){
    authBtn.innerHTML =
    `<a href="logout.html" class="login-btn">Logout</a>`;
}else{
    authBtn.innerHTML =
    `<a href="login.html" class="login-btn">Login</a>`;
}
</script>

<div class="container">
    <h2>Login</h2>

    <input type="text"
       id="username"
       placeholder="Username or Email">
    <input type="password"
       id="password"
       placeholder="Password">
    <button onclick="login()">Login</button>
    <p>Don't have an account, please register!</p>
    <a href="register.html"><button>Register</button></a>
</div>

<script>
function login() {

    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    let savedUser = localStorage.getItem("username");
    let savedPass = localStorage.getItem("password");
    let usernamePattern = /^[A-Za-z0-9_]+$/;
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(username === ""){
        alert("Username or Email is required");
        return;
    }

    if(
        !usernamePattern.test(username) &&
        !emailPattern.test(username)
    ){
        alert("Enter a valid Username or Email");
        return;
    }

    if(password === ""){
        alert("Password is required");
        return;
    }

    if(password.length < 6){
        alert("Password must be at least 6 characters");
        return;
    }
    if(username === savedUser && password === savedPass){

        localStorage.setItem("loggedIn","true");

        alert("Login Successful");

        window.location.href = "dashboard.html";

    }else{

        alert("Invalid Username/Email or Password");

    }
}
</script>

</body>
</html>
